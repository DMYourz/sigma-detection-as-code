title: Scheduled Task Creation via schtasks
id: 7e1b2c3d-4f5a-4b6c-8d9e-0f1a2b3c4d04
status: experimental
description: Detects creation of a scheduled task via schtasks.exe, frequently abused for persistence and privilege escalation.
references:
    - https://attack.mitre.org/techniques/T1053/005/
author: Daniel Mochkarovsky
date: 2026/06/28
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1053.005
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\schtasks.exe'
        CommandLine|contains: ' /create '
    condition: selection
falsepositives:
    - Legitimate software installers and administrative automation
level: medium
