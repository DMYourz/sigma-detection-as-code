title: WMIC Process Call Create
id: 7e1b2c3d-4f5a-4b6c-8d9e-0f1a2b3c4d05
status: experimental
description: Detects use of WMIC to spawn a new process, a technique used for both local execution and lateral movement.
references:
    - https://attack.mitre.org/techniques/T1047/
author: Daniel Mochkarovsky
date: 2026/06/28
tags:
    - attack.execution
    - attack.t1047
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\WMIC.exe'
        CommandLine|contains|all:
            - 'process'
            - 'call'
            - 'create'
    condition: selection
falsepositives:
    - Rare administrative scripting
level: high
