title: Encoded PowerShell Command Line
id: 7e1b2c3d-4f5a-4b6c-8d9e-0f1a2b3c4d01
status: experimental
description: Detects PowerShell launched with an encoded (-EncodedCommand) payload, a common way to hide malicious script content from casual inspection.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://attack.mitre.org/techniques/T1027/
author: Daniel Mochkarovsky
date: 2026/06/28
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense-evasion
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        - Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        - OriginalFileName: 'PowerShell.EXE'
    selection_enc:
        CommandLine|contains:
            - ' -enc '
            - ' -EncodedCommand '
            - ' -ec '
    condition: selection_img and selection_enc
falsepositives:
    - Rare administrative scripts that legitimately pass encoded commands
level: high
