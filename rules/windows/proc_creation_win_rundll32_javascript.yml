title: Rundll32 Executing JavaScript or VBScript
id: 7e1b2c3d-4f5a-4b6c-8d9e-0f1a2b3c4d03
status: experimental
description: Detects rundll32 used to execute inline JavaScript/VBScript, a signed-binary proxy execution technique used to run code outside script interpreters.
references:
    - https://attack.mitre.org/techniques/T1218/011/
author: Daniel Mochkarovsky
date: 2026/06/28
tags:
    - attack.defense-evasion
    - attack.t1218.011
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\rundll32.exe'
        CommandLine|contains:
            - 'javascript:'
            - 'vbscript:'
            - '.RegisterXLL'
    condition: selection
falsepositives:
    - Unknown
level: high
