name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: validate + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate Sigma rules
        run: python -m sigmatools validate
      - name: Run tests (matcher + detection regression)
        run: pytest -q
      - name: Compile rules to Splunk SPL + ATT&CK layer
        run: |
          python -m sigmatools convert
          python -m sigmatools coverage
      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-py${{ matrix.python-version }}
          path: generated/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check sigmatools tests
