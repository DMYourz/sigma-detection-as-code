[Sigma - Certutil Download via URLCache]
description = Detects the certutil LOLBin being used to download a file from a remote location, a common ingress tool transfer technique.
search = Image="*\\certutil.exe" CommandLine IN ("*urlcache*", "*verifyctl*") CommandLine IN ("*http*", "*ftp*", "*\\*")

[Sigma - Mshta Executing Remote Payload]
description = Detects mshta.exe executing a remote URL or inline script, a signed-binary proxy execution technique used to retrieve and run HTA/script payloads.
search = Image="*\\mshta.exe" CommandLine IN ("*http://*", "*https://*", "*vbscript:*", "*javascript:*")

[Sigma - Encoded PowerShell Command Line]
description = Detects PowerShell launched with an encoded (-EncodedCommand) payload, a common way to hide malicious script content from casual inspection.
search = Image IN ("*\\powershell.exe", "*\\pwsh.exe") OR OriginalFileName="PowerShell.EXE" CommandLine IN ("* -enc *", "* -EncodedCommand *", "* -ec *")

[Sigma - Rundll32 Executing JavaScript or VBScript]
description = Detects rundll32 used to execute inline JavaScript/VBScript, a signed-binary proxy execution technique used to run code outside script interpreters.
search = Image="*\\rundll32.exe" CommandLine IN ("*javascript:*", "*vbscript:*", "*.RegisterXLL*")

[Sigma - Scheduled Task Creation via schtasks]
description = Detects creation of a scheduled task via schtasks.exe, frequently abused for persistence and privilege escalation.
search = Image="*\\schtasks.exe" CommandLine="* /create *"

[Sigma - WMIC Process Call Create]
description = Detects use of WMIC to spawn a new process, a technique used for both local execution and lateral movement.
search = Image="*\\WMIC.exe" CommandLine="*process*" CommandLine="*call*" CommandLine="*create*"

[Sigma - Suspicious LSASS Process Access]
description = Detects a process opening a handle to LSASS with access rights commonly associated with credential dumping, excluding known-good system callers.
search = TargetImage="*\\lsass.exe" GrantedAccess IN ("0x1010", "0x1410", "0x1438", "0x143a", "0x1fffff") NOT (SourceImage IN ("*\\wininit.exe", "*\\MsMpEng.exe", "*\\svchost.exe"))

[Sigma - Registry Run Key Persistence]
description = Detects creation or modification of autostart Run/RunOnce registry keys by a non-standard process, a classic persistence mechanism.
search = TargetObject IN ("*\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\\*", "*\\Software\\Microsoft\\Windows\\CurrentVersion\\RunOnce\\*", "*\\Software\\Wow6432Node\\Microsoft\\Windows\\CurrentVersion\\Run\\*") NOT (Image IN ("*\\explorer.exe", "*\\msiexec.exe"))
